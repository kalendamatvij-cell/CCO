<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новини ССО</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 50%, #1e293b 100%);
        }
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-color: rgba(96, 165, 250, 0.3);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-gray-100">
    <nav class="fixed top-8 left-0 right-0 bg-slate-900/95 backdrop-blur-sm z-50 border-b border-slate-700">
        <div class="w-full px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-cyan-400">📰</span>
                    <span class="ml-2 text-sm text-gray-400">Новини ССО</span>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="px-4 py-2 bg-slate-700/50 hover:bg-slate-600/50 rounded-lg text-sm font-medium text-gray-300 hover:text-white transition-all duration-300 border border-slate-600/50 hover:border-slate-500/50">
                        ← Головна
                    </a>
                    <div class="h-6 w-px bg-slate-600"></div>
                    <a href="sso.html" class="px-4 py-2 bg-blue-900/30 hover:bg-blue-800/40 rounded-lg text-sm font-medium text-blue-400 hover:text-blue-300 transition-all duration-300 border border-blue-700/50 hover:border-blue-600/50">
                        ССО
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <header class="pt-32 pb-12 px-4">
        <div class="w-full text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-4">Новини ССО</h1>
            <p class="text-lg md:text-xl text-gray-300">Офіційні новини підрозділу</p>
        </div>
    </header>

    <main class="w-full pb-20 px-4 sm:px-6 lg:px-8">
        <section class="mb-16">
            <div class="bg-gradient-to-br from-slate-800/70 to-slate-900/70 rounded-2xl p-6 md:p-8 border border-slate-700/50 card-hover backdrop-blur-sm">
                <div class="flex items-center mb-6">
                    <div class="bg-gradient-to-br from-cyan-600 to-blue-700 rounded-xl p-4 mr-4">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h10l6 6v10a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold text-white">Перша новина</h2>
                </div>

                <div class="bg-gradient-to-r from-cyan-900/20 to-blue-900/20 rounded-xl p-5 border border-cyan-700/30">
                    <p class="text-white font-medium mb-2">На посаду Начальника Академії ССО призначений @[Нач.Ак.ССО] Олег Допович !!!</p>
                    <p class="text-gray-300">Побажаємо успіхів на посаді</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
